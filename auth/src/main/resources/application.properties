
spring.application.name=auth

# ===============================
# MySQL Database Connection
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/auth-service
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Settings
# ===============================
# Shows the SQL queries in your console (helpful for debugging)
spring.jpa.show-sql=true

# Automatically updates the database schema based on your Entity classes
spring.jpa.hibernate.ddl-auto=update

# Explicitly set the dialect (Spring usually auto-detects this, but it's good to be specific)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect